<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Slaughter Games – Login</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
</head>
<body>
  <div class="container">
    <div class="topbar">
      <h1>Slaughter Games – Turnier App</h1>
      <span class="badge">Login</span>
    </div>

    <section class="card">
      <h2>Anmelden</h2>
      <form id="loginForm">
        <label for="loginEmail">Login-Name oder E-Mail</label>
        <input id="loginEmail" type="text" required />
        <label for="loginPassword">Passwort</label>
        <input id="loginPassword" type="password" required />
        <div style="margin-top:12px"><button type="submit">Einloggen</button></div>
      </form>
      <p class="helper">Registrierung ist deaktiviert. User werden vom Admin angelegt.</p>
    </section>

    <p id="authMsg" class="muted"></p>
  </div>

  <script type="module">
    import { bindAuthUI, getSessionUser } from './js/auth.js';
    bindAuthUI();
    const user = await getSessionUser();
    if(user){ window.location.href = './dashboard.html'; }
  </script>
</body>
</html>
