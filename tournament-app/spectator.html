  <title>Slaughter Games – Spectator View</title>
  <link rel="stylesheet" href="./styles.css" />

<body>

      <h1 id="sTitle">Spectator</h1>

      <h2>Live Standings (Read-Only)</h2>

            <tr><th>Rank</th><th>Name</th><th>Record</th><th>MP</th><th>OMW%</th><th>GW%</th><th>OGW%</th></tr>
          </thead>
          <tbody id="sStandings"></tbody>
        </table>
      </div>
      <p class="helper" id="sMeta"></p>
    </section>
  </div>
  <script type="module" src="./js/spectator-page.js"></script>
</body>
