<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Slaughter Games – Spielerprofil</title>
  <link rel="stylesheet" href="styles.css?v=1.5" />
  <style>
    .pp-wrap{max-width:900px;margin:0 auto;padding:16px}
    .pp-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:12px}
    .pp-card{background:#171a21;border-radius:12px;padding:16px;color:#fff}
    .pp-name{font-size:30px;margin:0}.pp-real{opacity:.8;margin:4px 0 12px}
    .pp-grid{display:grid;grid-template-columns:120px 1fr;gap:16px}
    .pp-img{width:120px;height:120px;object-fit:cover;border-radius:10px;border:2px solid #2b3240}
    .chip{display:inline-block;background:#2a313f;padding:4px 8px;border-radius:999px;margin:2px;font-size:12px}
  </style>
</head>
<body>
  <div class="pp-wrap">
    <div class="pp-head">
      <a href="index.html"><img src="main_logo.png" alt="SG" style="height:44px"></a>
      <a href="javascript:history.back()" class="nav-link-blog">← Zurück</a>
    </div>

    <div class="pp-card">
      <div class="pp-grid">
        <img id="ppImg" class="pp-img" src="main_logo.png" alt="Profilbild" />
        <div>
          <h1 id="ppName" class="pp-name">Spieler</h1>
          <div id="ppReal" class="pp-real"></div>

          <h3>SG Teilnahmen</h3>
          <div id="ppParts"></div>

          <h3>Äxte</h3>
          <div id="ppAxes"></div>

          <h3>Abzeichen</h3>
          <div id="ppBadges"></div>

          <h3>Beschreibung</h3>
          <p id="ppDesc"></p>
        </div>
      </div>
    </div>
  </div>

  <script src="./tournament-app/js/player-profile-page.js" type="module"></script>
</body>
</html>
